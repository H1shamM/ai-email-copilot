[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = ["-v", "--tb=short", "-m", "not integration"]
markers = [
    "integration: opt-in tests that hit real APIs (Gmail, Claude). Run with `pytest -m integration`. Excluded by default.",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/__init__.py",
    "app/*/__init__.py",
    "app/main.py",
    "app/gmail/auth.py",       # OAuth flow — covered by integration tests
    "app/telegram/bot.py",     # Application wiring — covered by manual e2e
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
fail_under = 80

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true