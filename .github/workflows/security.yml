name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      # -ll = report medium+ severity only, keeping low-confidence noise out of the gate
      - name: Bandit scan
        run: bandit -r app/ -ll

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # exit-code: 0 keeps this report-only for the initial rollout. Flip to 1
      # (gate the build) once the first run's HIGH/CRITICAL backlog is triaged — see #65.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          scanners: "vuln,secret,misconfig"
          exit-code: "0"
